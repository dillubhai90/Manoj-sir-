<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  width: 330px;
  padding: 25px;
  text-align: center;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

/* Animated Border */
.card::before {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 20px;
  background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet, red);
  background-size: 400%;
  animation: borderMove 6s linear infinite;
  z-index: -1;
}

.card::after {
  content: "";
  position: absolute;
  inset: 3px;
  background: #e6ddc6;
  border-radius: 18px;
  z-index: -1;
}

@keyframes borderMove {
  0% { background-position: 0% }
  100% { background-position: 400% }
}

/* Logo */
.logo {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  animation: zoom 2s infinite alternate;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.12); }
}

/* Heading */
h2 {
  color: #0b2a5b;
  margin: 10px 0;
}

/* Subscribers */
.subs {
  font-size: 18px;
  margin-bottom: 10px;
}

/* Text */
.text {
  font-weight: bold;
  color: #0b2a5b;
  margin-bottom: 15px;
}

/* Countdown */
.countdown {
  background: #ff004c;
  color: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: bold;
}

/* Button */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #1da1f2;
  color: white;
  padding: 14px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  animation: pulse 1.5s infinite;
  transition: 0.3s;
}

.btn img {
  width: 22px;
}

/* Button Zoom Animation */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.btn:hover {
  transform: scale(1.15);
  box-shadow: 0 0 20px #1da1f2;
}

/* Footer */
.footer {
  margin-top: 15px;
  font-size: 14px;
}
</style>

<div class="card">

  <!-- Logo -->
  <img src="https://raw.githubusercontent.com/dillubhai90/Manoj-sir/main/IMG_20260407_192933_417.jpg" class="logo">

  <h2>Manoj sir</h2>

  <!-- Subscribers -->
  <div class="subs">
    <span id="counter">30000</span> Subscribers
  </div>

  <!-- Text -->
  <div class="text">
    All Game VIP Charts Available Here
  </div>

  <!-- Countdown -->
  <div class="countdown" id="timer">
    Free Joining Ends In 30 Seconds
  </div>

  <!-- Telegram Button -->
  <a href="https://t.me/+Plrml4b52SZkN2Jl" class="btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    JOIN FREE TELEGRAM
  </a>

  <!-- Footer -->
  <div class="footer">
    SIRF 3 DIN HAMARE SATH KAAM KARKE DEKHO
  </div>

</div>

<script>
// Subscriber Counter
let count = 30000;
setInterval(() => {
  count += Math.floor(Math.random() * 2);
  document.getElementById("counter").innerText = count;
}, 2000);

// Countdown Timer
let time = 30;
let timer = document.getElementById("timer");

let interval = setInterval(() => {
  time--;
  timer.innerText = "Free Joining Ends In " + time + " Seconds";

  if (time <= 0) {
    clearInterval(interval);
    timer.innerText = "Hurry Up! Last Chance 🚀";
  }
}, 1000);
</script>
